<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="src/tarefas.js" ></script>
    <link rel="stylesheet" href="tarefas.css" />
</head>
<body>
    <h1>Tarefas</h1>
    <menu>
        <button id="adicionar">Adicionar</button>
        <button id="remover">Remover</button>
    </menu>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Descrição</th>
                <th>Feita</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <dialog>
        <form method="dialog" >
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" />
            <input type="checkbox" id="feita" />
            <label for="feita">Feita</label>
            <button id="salvar">Salvar</button>
            <button>Cancelar</button>
        </form>
    </dialog>
</body>
</html>
